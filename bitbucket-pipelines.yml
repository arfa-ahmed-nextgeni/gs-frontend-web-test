image: amazon/aws-cli

definitions:
  caches:
    npm: $BITBUCKET_CLONE_DIR/node_modules
    nextcache: .next/cache
  services:
    docker:
      memory: 2048

pipelines:
  branches:
    develop:
      - step:
          name: "Build Next.js Application (Dev)"
          image: node:24-alpine
          size: 2x
          caches:
            - npm
            - nextcache
          script:
            - apk add --no-cache libc6-compat git aws-cli jq
            - |
              aws secretsmanager get-secret-value \
                --secret-id "dev-magnext-web" \
                --region eu-central-1 \
                --query SecretString \
                --output text | jq -r 'to_entries | .[] | "\(.key)=\(.value)"' > .env
            - npm ci --prefer-offline --no-audit
            - npm run build
          artifacts:
            - .next/standalone/**
            - .next/static/**
            - public/**
            - .env
      - step:
          name: "Docker Build and Push (Dev)"
          services:
            - docker
          caches:
            - docker
          script:
            - aws ecr get-login-password --region eu-central-1 | docker login --username AWS --password-stdin 439413061158.dkr.ecr.eu-central-1.amazonaws.com
            - docker build --build-arg BUILDKIT_INLINE_CACHE=1 -t dev_magnext_web .
            - docker tag dev_magnext_web:latest 439413061158.dkr.ecr.eu-central-1.amazonaws.com/dev_magnext_web:latest
            - docker tag dev_magnext_web:latest 439413061158.dkr.ecr.eu-central-1.amazonaws.com/dev_magnext_web:$BITBUCKET_BUILD_NUMBER
            - docker push 439413061158.dkr.ecr.eu-central-1.amazonaws.com/dev_magnext_web:latest
            - docker push 439413061158.dkr.ecr.eu-central-1.amazonaws.com/dev_magnext_web:$BITBUCKET_BUILD_NUMBER
      - parallel:
          - step:
              name: Refresh ArgoCD App (Dev)
              image: amazon/aws-cli
              script:
                - yum update -y && yum install -y git
                - git clone -b develop --single-branch https://$BITBUCKET_USERNAME:$BITBUCKET_APP_PASSWORD@bitbucket.org/goldenscent/magnext_config.git
                - cd magnext_config/magnext_web
                - sed -i "s|magnext_web:[^ ]*|magnext_web:$BITBUCKET_BUILD_NUMBER|g" argo.yaml
                - git config user.name "Bitbucket Pipelines"
                - git config user.email "pipelines@bitbucket.org"
                - git add argo.yaml
                - git commit -m "Pipeline Update tag $BITBUCKET_BUILD_NUMBER"
                - git push
          - step:
              name: Async CloudFront Invalidation (Dev)
              image: amazon/aws-cli
              script:
                - aws cloudfront create-invalidation --distribution-id E1EY6KS9D8Z36T --paths "/*" || true

    uat:
      - step:
          name: "Build Next.js Application (UAT)"
          image: node:24-alpine
          size: 2x
          caches:
            - npm
            - nextcache
          script:
            - apk add --no-cache libc6-compat git aws-cli jq
            - |
              aws secretsmanager get-secret-value \
                --secret-id "uat-magnext-web" \
                --region eu-central-1 \
                --query SecretString \
                --output text | jq -r 'to_entries | .[] | "\(.key)=\(.value)"' > .env
            - npm ci --prefer-offline --no-audit
            - npm run build
          artifacts:
            - .next/standalone/**
            - .next/static/**
            - public/**
            - .env
      - step:
          name: "Docker Build and Push (UAT)"
          services:
            - docker
          caches:
            - docker
          script:
            - aws ecr get-login-password --region eu-central-1 | docker login --username AWS --password-stdin 439413061158.dkr.ecr.eu-central-1.amazonaws.com
            - docker build --build-arg BUILDKIT_INLINE_CACHE=1 -t uat_magnext_web .
            - docker tag uat_magnext_web:latest 439413061158.dkr.ecr.eu-central-1.amazonaws.com/uat_magnext_web:latest
            - docker tag uat_magnext_web:latest 439413061158.dkr.ecr.eu-central-1.amazonaws.com/uat_magnext_web:$BITBUCKET_BUILD_NUMBER
            - docker push 439413061158.dkr.ecr.eu-central-1.amazonaws.com/uat_magnext_web:latest
            - docker push 439413061158.dkr.ecr.eu-central-1.amazonaws.com/uat_magnext_web:$BITBUCKET_BUILD_NUMBER
      - parallel:
          - step:
              name: Refresh ArgoCD App (UAT)
              image: amazon/aws-cli
              script:
                - yum update -y && yum install -y git
                - git clone -b uat --single-branch https://$BITBUCKET_USERNAME:$BITBUCKET_APP_PASSWORD@bitbucket.org/goldenscent/magnext_config.git
                - cd magnext_config/magnext_web
                - sed -i "s|uat_magnext_web:[^ ]*|uat_magnext_web:$BITBUCKET_BUILD_NUMBER|g" argo.yaml
                - git config user.name "Bitbucket Pipelines"
                - git config user.email "pipelines@bitbucket.org"
                - git add argo.yaml
                - git commit -m "Pipeline Update UAT tag $BITBUCKET_BUILD_NUMBER"
                - git push origin uat
          - step:
              name: Async CloudFront Invalidation (UAT)
              image: amazon/aws-cli
              script:
                - aws cloudfront create-invalidation --distribution-id ERFHNHONE2LD7 --paths "/*" || true